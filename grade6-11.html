<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6-11 Papers</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
}

header{
background:#1565c0;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

.download{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#28a745;
color:white;
text-decoration:none;
border-radius:6px;
}

.download:hover{
background:#218838;
}
</style>

</head>
<body>

<header>
<h1>Grade 6-11 Term Test Papers</h1>
<p>Select Your Grade</p>
</header>

<div class="container">

<div class="card">
<h2>Grade 6</h2>
<a class="download" href="#">Open</a>
</div>

<div class="card">
<h2>Grade 7</h2>
<a class="download" href="#">Open</a>
</div>

<div class="card">
<h2>Grade 8</h2>
<a class="download" href="#">Open</a>
</div>

<div class="card">
<h2>Grade 9</h2>
<a class="download" href="#">Open</a>
</div>

<div class="card">
<h2>Grade 10</h2>
<a class="download" href="#">Open</a>
</div>

<div class="card">
<h2>Grade 11</h2>
<a class="download" href="#">Open</a>
</div>

</div>

</body>
</html>
