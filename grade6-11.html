<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade 6-11</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
margin:0;
}

header{
background:#1565c0;
color:white;
text-align:center;
padding:30px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

.card a{
display:inline-block;
margin-top:10px;
padding:10px 20px;
background:#0a8f08;
color:white;
text-decoration:none;
border-radius:5px;
}

.card a:hover{
background:#066b06;
}
</style>
</head>

<body>

<header>
<h1>Grade 6-11 Term Test Papers</h1>
<p>Select Your Grade</p>
</header>

<div class="container">

<div class="card">
<h2>Grade 6</h2>
<a href="#">Open</a>
</div>

<div class="card">
<h2>Grade 7</h2>
<a href="#">Open</a>
</div>

<div class="card">
<h2>Grade 8</h2>
<a href="#">Open</a>
</div>

<div class="card">
<h2>Grade 9</h2>
<a href="#">Open</a>
</div>

<div class="card">
<h2>Grade 10</h2>
<a href="#">Open</a>
</div>

<div class="card">
<h2>Grade 11</h2>
<a href="#">Open</a>
</div>

</div>

</body>
</html>
